<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">Temporal strategy figure</title>
  <desc id="desc">A timeline showing broad localizer and imagery windows together with narrow prototype search tiers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbfcfd"/>
      <stop offset="100%" stop-color="#eef3f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="440" rx="28" fill="url(#bg)"/>

  <text x="60" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#173042">
    Temporal Search Strategy
  </text>
  <text x="60" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#516a78">
    Broad windows support transfer learning, while narrow tiers search for concentrated imagery evidence
  </text>

  <text x="80" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#274d63">Localizer</text>
  <line x1="220" y1="160" x2="1100" y2="160" stroke="#9cb0bd" stroke-width="4"/>
  <rect x="332" y="136" width="114" height="48" rx="14" fill="#3d8dad"/>
  <rect x="388" y="136" width="108" height="48" rx="14" fill="#5ea3bc"/>
  <rect x="442" y="136" width="100" height="48" rx="14" fill="#86bfd0"/>
  <text x="347" y="166" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff">0.15-0.80 s</text>
  <text x="403" y="166" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff">0.20-0.80 s</text>
  <text x="457" y="166" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#12384a">0.30-0.80 s</text>

  <text x="80" y="260" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#5f5a1f">Imagery</text>
  <line x1="220" y1="250" x2="1100" y2="250" stroke="#c7c38f" stroke-width="4"/>
  <rect x="500" y="226" width="250" height="48" rx="14" fill="#9aa441"/>
  <rect x="500" y="226" width="350" height="48" rx="14" fill="#b4bd63" fill-opacity="0.65"/>
  <rect x="600" y="226" width="250" height="48" rx="14" fill="#d3da95" fill-opacity="0.8"/>
  <text x="523" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff">1.0-3.5 s</text>
  <text x="635" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#394109">1.5-4.0 s</text>

  <text x="80" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#7b4b2a">Prototype tiers</text>
  <line x1="220" y1="340" x2="1100" y2="340" stroke="#d3b39d" stroke-width="4"/>
  <rect x="300" y="316" width="120" height="48" rx="14" fill="#d17b43"/>
  <rect x="500" y="316" width="120" height="48" rx="14" fill="#bb5c46"/>
  <rect x="500" y="376" width="220" height="28" rx="14" fill="#d29b6e"/>
  <rect x="300" y="376" width="260" height="28" rx="14" fill="#e7c09e"/>
  <text x="328" y="346" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff">N170: 0.10-0.25 s</text>
  <text x="526" y="346" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff">P300: 0.30-0.42 s</text>
  <text x="520" y="396" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#5e3820">Imagery focus: 1.4-2.8 s</text>
  <text x="320" y="396" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#6a4b35">Early search tier: 0.6-1.5 s imagery</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#607785">
    <text x="220" y="124">0.0 s</text>
    <text x="396" y="124">0.5 s</text>
    <text x="572" y="124">1.0 s</text>
    <text x="748" y="124">1.5 s</text>
    <text x="924" y="124">2.0 s</text>
    <text x="1086" y="124">2.5+ s</text>
  </g>
</svg>
