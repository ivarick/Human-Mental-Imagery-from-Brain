<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Temporal strategy figure</title>
  <desc id="desc">A timeline showing broad localizer and imagery windows together with narrow prototype search tiers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1722"/>
      <stop offset="100%" stop-color="#172433"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0%" stop-color="#182738"/>
      <stop offset="100%" stop-color="#223246"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#04070c" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="460" rx="28" fill="url(#bg)"/>
  <rect x="24" y="20" width="1152" height="420" rx="26" fill="url(#panel)" stroke="#2a3a4d" stroke-width="2"/>

  <text x="60" y="70" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#f2f7fb">
    Temporal Search Strategy
  </text>
  <text x="60" y="106" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="18" fill="#a9bed0">
    Broad windows support transfer learning, while narrow tiers search for concentrated imagery evidence
  </text>

  <g font-family="Aptos, Segoe UI, Arial, sans-serif">
    <text x="220" y="140" font-size="15" fill="#9eb4c7">0.0 s</text>
    <text x="396" y="140" font-size="15" fill="#9eb4c7">0.5 s</text>
    <text x="572" y="140" font-size="15" fill="#9eb4c7">1.0 s</text>
    <text x="748" y="140" font-size="15" fill="#9eb4c7">1.5 s</text>
    <text x="924" y="140" font-size="15" fill="#9eb4c7">2.0 s</text>
    <text x="1080" y="140" font-size="15" fill="#9eb4c7">2.5+ s</text>
  </g>

  <g font-family="Aptos, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <text x="80" y="183" font-size="22" font-weight="700" fill="#d8efff">Localizer</text>
    <line x1="220" y1="174" x2="1100" y2="174" stroke="#6e8aa0" stroke-width="4"/>
    <rect x="332" y="152" width="132" height="44" rx="14" fill="#177ea5"/>
    <rect x="386" y="152" width="132" height="44" rx="14" fill="#2a95ba" fill-opacity="0.85"/>
    <rect x="440" y="152" width="132" height="44" rx="14" fill="#65b7d1" fill-opacity="0.72"/>
    <text x="353" y="179" font-size="15" fill="#ffffff">0.15-0.80 s</text>
    <text x="407" y="179" font-size="15" fill="#ffffff">0.20-0.80 s</text>
    <text x="461" y="179" font-size="15" fill="#e8f7ff">0.30-0.80 s</text>
  </g>

  <g font-family="Aptos, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <text x="80" y="275" font-size="22" font-weight="700" fill="#eff2bf">Imagery</text>
    <line x1="220" y1="266" x2="1100" y2="266" stroke="#9ea45f" stroke-width="4"/>
    <rect x="500" y="244" width="248" height="44" rx="14" fill="#8e9937"/>
    <rect x="500" y="244" width="350" height="44" rx="14" fill="#a5af4c" fill-opacity="0.62"/>
    <rect x="600" y="244" width="250" height="44" rx="14" fill="#c9d37d" fill-opacity="0.74"/>
    <text x="520" y="271" font-size="15" fill="#ffffff">1.0-3.5 s</text>
    <text x="626" y="271" font-size="15" fill="#253002">1.5-4.0 s</text>
  </g>

  <g font-family="Aptos, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <text x="80" y="367" font-size="22" font-weight="700" fill="#ffd8c0">Prototype tiers</text>
    <line x1="220" y1="358" x2="1100" y2="358" stroke="#a98067" stroke-width="4"/>

    <rect x="300" y="336" width="150" height="44" rx="14" fill="#c9682d"/>
    <rect x="492" y="336" width="154" height="44" rx="14" fill="#a5483f"/>
    <text x="322" y="363" font-size="15" fill="#ffffff">N170: 0.10-0.25 s</text>
    <text x="514" y="363" font-size="15" fill="#ffffff">P300: 0.30-0.42 s</text>

    <rect x="298" y="394" width="264" height="28" rx="14" fill="#d8a882"/>
    <rect x="560" y="394" width="208" height="28" rx="14" fill="#bf865a"/>
    <text x="316" y="413" font-size="14" fill="#44230f">Early imagery search: 0.6-1.5 s</text>
    <text x="584" y="413" font-size="14" fill="#fff2e8">Imagery focus: 1.4-2.8 s</text>
  </g>
</svg>
